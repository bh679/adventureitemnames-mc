name: Release

# Releases are dispatch-only. There is intentionally no `push: tags` trigger:
# the release workflow is the SOURCE of tags, not a consumer. A tag pushed by
# any other path (manual `git tag && push`, `gh release create`, stray script)
# becomes a visible orphan with no release attached.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create + release (e.g. v0.2.0). Will be created from main HEAD — must NOT already exist."
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v3

      - name: Verify input tag matches mod_version on main
        run: |
          TAG="${RELEASE_TAG#v}"
          GRADLE_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          if [ "$TAG" != "$GRADLE_VERSION" ]; then
            echo "::error::Input tag $RELEASE_TAG does not match mod_version=$GRADLE_VERSION on main. Bump gradle.properties to $TAG (or re-dispatch with tag=v$GRADLE_VERSION) before releasing."
            exit 1
          fi
          echo "MOD_VERSION=$GRADLE_VERSION" >> "$GITHUB_ENV"

      - name: Check tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists on remote (likely an orphan from before the dispatch-only flow). Delete it first: gh api -X DELETE repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
            exit 1
          fi

      - name: Compute release type from tag
        id: release_type
        run: |
          TAG_NUMERIC="${RELEASE_TAG#v}"
          MAJOR="${TAG_NUMERIC%%.*}"
          if [ "$MAJOR" -gt 0 ] 2>/dev/null; then
            echo "type=release" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Release type: release (tag $RELEASE_TAG, MAJOR=$MAJOR > 0)"
          else
            echo "type=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Release type: beta (tag $RELEASE_TAG, MAJOR=$MAJOR — pre-1.0)"
          fi

      - run: ./gradlew build --no-daemon

      # Multi-loader builds put each loader's production jar in its own
      # subproject's build/libs/. Stage them into one directory so the
      # GitHub-release / Modrinth / CurseForge upload steps have a single
      # glob target, and so any dev/sources/dev-shadow classified jars are
      # excluded by being filtered out here rather than in every upload step.
      - name: Stage loader jars for release
        run: |
          mkdir -p release-artifacts
          cp fabric/build/libs/adventureitemnames-fabric-${MOD_VERSION}.jar      release-artifacts/
          cp forge/build/libs/adventureitemnames-forge-${MOD_VERSION}.jar        release-artifacts/
          cp neoforge/build/libs/adventureitemnames-neoforge-${MOD_VERSION}.jar  release-artifacts/
          echo "=== release-artifacts contents ==="
          ls -la release-artifacts/
          # Sanity check: exactly 3 jars, all production (no classifier).
          COUNT=$(ls release-artifacts/*.jar | wc -l)
          if [ "$COUNT" -ne 3 ]; then
            echo "::error::Expected 3 loader jars in release-artifacts/, found $COUNT"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Adventure Item Names ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release-artifacts/*.jar
          fail_on_unmatched_files: true
          prerelease: ${{ steps.release_type.outputs.prerelease == 'true' }}

      - name: Check wiki publish prerequisites
        id: wiki_check
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          if [ -n "$WIKI_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::WIKI_TOKEN secret not set — skipping wiki publish."
          fi

      - name: Publish wiki Downloads pages
        if: steps.wiki_check.outputs.ready == 'true'
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: bash scripts/publish-wiki.sh

      - name: Check mod-platform publish prerequisites
        id: publish_check
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
        run: |
          MODRINTH_READY=false
          CURSEFORGE_READY=false
          if [ -n "$MODRINTH_TOKEN" ] && [ -n "$MODRINTH_PROJECT_ID" ]; then
            MODRINTH_READY=true
          else
            echo "::warning::Modrinth secret/variable missing — skipping Modrinth publish."
          fi
          if [ -n "$CURSEFORGE_TOKEN" ] && [ -n "$CURSEFORGE_PROJECT_ID" ]; then
            CURSEFORGE_READY=true
          else
            echo "::warning::CurseForge secret/variable missing — skipping CurseForge publish."
          fi
          echo "modrinth=$MODRINTH_READY" >> "$GITHUB_OUTPUT"
          echo "curseforge=$CURSEFORGE_READY" >> "$GITHUB_OUTPUT"

      # Each loader publishes as its own Modrinth/CurseForge version, tagged
      # with exactly one loader and containing exactly one jar. Modrinth and
      # CurseForge launchers (and the website filters) then auto-pick the
      # right file for the user's installed loader. version_number uses SemVer
      # build-metadata suffix (e.g. 0.2.0+fabric) so the three versions stay
      # distinct on the platforms while sharing a human-readable release tag.
      - name: Publish Fabric to Modrinth + CurseForge
        id: publish_fabric
        if: steps.publish_check.outputs.modrinth == 'true' || steps.publish_check.outputs.curseforge == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.publish_check.outputs.modrinth == 'true' && vars.MODRINTH_PROJECT_ID || '' }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.publish_check.outputs.curseforge == 'true' && vars.CURSEFORGE_PROJECT_ID || '' }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: release-artifacts/adventureitemnames-fabric-${{ env.MOD_VERSION }}.jar
          name: Adventure Item Names ${{ env.RELEASE_TAG }} (Fabric)
          version: ${{ env.RELEASE_TAG }}+fabric
          version-type: ${{ steps.release_type.outputs.type }}
          loaders: fabric
          game-versions: 1.21.1
          java: 21
          retry-attempts: 2
          retry-delay: 10000
          fail-mode: warn

      - name: Publish Forge to Modrinth + CurseForge
        id: publish_forge
        if: steps.publish_check.outputs.modrinth == 'true' || steps.publish_check.outputs.curseforge == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.publish_check.outputs.modrinth == 'true' && vars.MODRINTH_PROJECT_ID || '' }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.publish_check.outputs.curseforge == 'true' && vars.CURSEFORGE_PROJECT_ID || '' }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: release-artifacts/adventureitemnames-forge-${{ env.MOD_VERSION }}.jar
          name: Adventure Item Names ${{ env.RELEASE_TAG }} (Forge)
          version: ${{ env.RELEASE_TAG }}+forge
          version-type: ${{ steps.release_type.outputs.type }}
          loaders: forge
          game-versions: 1.21.1
          java: 21
          retry-attempts: 2
          retry-delay: 10000
          fail-mode: warn

      - name: Publish NeoForge to Modrinth + CurseForge
        id: publish_neoforge
        if: steps.publish_check.outputs.modrinth == 'true' || steps.publish_check.outputs.curseforge == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.publish_check.outputs.modrinth == 'true' && vars.MODRINTH_PROJECT_ID || '' }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.publish_check.outputs.curseforge == 'true' && vars.CURSEFORGE_PROJECT_ID || '' }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: release-artifacts/adventureitemnames-neoforge-${{ env.MOD_VERSION }}.jar
          name: Adventure Item Names ${{ env.RELEASE_TAG }} (NeoForge)
          version: ${{ env.RELEASE_TAG }}+neoforge
          version-type: ${{ steps.release_type.outputs.type }}
          loaders: neoforge
          game-versions: 1.21.1
          java: 21
          retry-attempts: 2
          retry-delay: 10000
          fail-mode: warn

      - name: Check Discord webhook prerequisites
        id: discord_check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DISCORD_WEBHOOK_URL secret not set — skipping Discord notification."
          fi

      # always() so partial-failure releases still notify (with ⚠️ markers
      # on the platforms that didn't get the upload). RELEASE_TAG guard
      # suppresses notify if the workflow exploded before tag verification.
      - name: Notify Discord
        if: ${{ always() && steps.discord_check.outputs.ready == 'true' && env.RELEASE_TAG != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          REPO: ${{ github.repository }}
          PRERELEASE: ${{ steps.release_type.outputs.prerelease }}
          MODRINTH_FABRIC_VERSION: ${{ steps.publish_fabric.outputs.modrinth-version }}
          MODRINTH_FORGE_VERSION: ${{ steps.publish_forge.outputs.modrinth-version }}
          MODRINTH_NEOFORGE_VERSION: ${{ steps.publish_neoforge.outputs.modrinth-version }}
          CURSEFORGE_FABRIC_VERSION: ${{ steps.publish_fabric.outputs.curseforge-version }}
          CURSEFORGE_FORGE_VERSION: ${{ steps.publish_forge.outputs.curseforge-version }}
          CURSEFORGE_NEOFORGE_VERSION: ${{ steps.publish_neoforge.outputs.curseforge-version }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/notify-discord.sh
